version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 4
    labels:
      - dependencies
    reviewers:
      - dkhaye
    versioning-strategy: increase
    groups:
      test-dependencies:
        dependency-type: development
        patterns:
          - "@testing-library/*"
          - "jest"
          - "jest-*"
          - "react-test-renderer"
      lint-dependencies:
        dependency-type: development
        patterns:
          - "eslint"
          - "eslint-*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/New_York
    open-pull-requests-limit: 4
    labels:
      - dependencies
    reviewers:
      - dkhaye
